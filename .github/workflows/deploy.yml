name: Deploy Backend

on:
  push:
    branches: [deploy]

env:
  MYSQL_ROOT_PASSWORD: rootpass

jobs:
  deploy:
    strategy:
      matrix:
        include:
          - service: back-despacho
            dockerfile: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
            context: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
            label: despachos
            db_port: "3307"
            api_port: "8081"
            db_name: despachos_db
          - service: back-ventas
            dockerfile: back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
            context: back-Ventas_SpringBoot/Springboot-API-REST
            label: ventas
            db_port: "3308"
            api_port: "8080"
            db_name: ventas_db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t danibetancourt/${{ matrix.service }}:${{ env.IMAGE_TAG }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          docker push danibetancourt/${{ matrix.service }}:${{ env.IMAGE_TAG }}

      - name: Deploy ${{ matrix.service }} via SSM
        env:
          IMAGE_TAG: ${{ github.sha }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_BACKEND_ID }}
          DOCKER_PWD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USR: ${{ secrets.DOCKER_USERNAME }}
          LABEL: ${{ matrix.label }}
          DB_PORT: ${{ matrix.db_port }}
          API_PORT: ${{ matrix.api_port }}
          DB_NAME: ${{ matrix.db_name }}
          IMAGE: danibetancourt/${{ matrix.service }}
          TAG: ${{ github.sha }}
        run: |
          COMMAND="#!/bin/bash
          set -e
          echo \"${DOCKER_PWD}\" | docker login -u \"${DOCKER_USR}\" --password-stdin
          docker pull ${IMAGE}:${TAG}

          docker network create ${LABEL}-net 2>/dev/null || true

          docker stop db-${LABEL} 2>/dev/null || true
          docker rm db-${LABEL} 2>/dev/null || true
          docker run -d \
            --name db-${LABEL} \
            --network ${LABEL}-net \
            -e MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD} \
            -e MYSQL_DATABASE=${DB_NAME} \
            -v mysql-${LABEL}-data:/var/lib/mysql \
            mysql:8

          for i in \$(seq 1 30); do
            if docker exec db-${LABEL} mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo \"MySQL ${LABEL} is healthy\"
              break
            fi
            sleep 2
          done

          docker stop ${LABEL}-api 2>/dev/null || true
          docker rm ${LABEL}-api 2>/dev/null || true
          docker run -d \
            --name ${LABEL}-api \
            --network ${LABEL}-net \
            -p ${API_PORT}:${API_PORT} \
            -e DB_ENDPOINT=db-${LABEL} \
            -e DB_PORT=3306 \
            -e DB_NAME=${DB_NAME} \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=${MYSQL_ROOT_PASSWORD} \
            ${IMAGE}:${TAG}"

          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=$COMMAND" \
            --query Command.CommandId \
            --output text
