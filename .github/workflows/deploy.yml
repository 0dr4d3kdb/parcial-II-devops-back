name: Deploy Backend

on:
  push:
    branches: [deploy]

jobs:
  deploy:
    strategy:
      matrix:
        include:
          - service: back-despacho
            dockerfile: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
            context: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
            compose: docker-compose.despachos.yml
          - service: back-ventas
            dockerfile: back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
            context: back-Ventas_SpringBoot/Springboot-API-REST
            compose: docker-compose.ventas.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t danibetancourt/${{ matrix.service }}:${{ env.IMAGE_TAG }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          docker push danibetancourt/${{ matrix.service }}:${{ env.IMAGE_TAG }}

      - name: Deploy ${{ matrix.service }} to EC2 via SSM
        env:
          IMAGE_TAG: ${{ github.sha }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_BACKEND_ID }}
          COMPOSE_FILE: ${{ matrix.compose }}
          DOCKER_PWD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USR: ${{ secrets.DOCKER_USERNAME }}
        run: |
          COMMAND="#!/bin/bash
          set -e
          echo \"${DOCKER_PWD}\" | docker login -u \"${DOCKER_USR}\" --password-stdin
          docker pull danibetancourt/${{ matrix.service }}:${IMAGE_TAG}
          cd /home/ec2-user
          docker compose -f ${COMPOSE_FILE} up -d --pull always"
          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=$COMMAND" \
            --query Command.CommandId \
            --output text
