services:
  db-ventas:
    image: mysql:8
    container_name: db-ventas
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ventas_db
    volumes:
      - mysql-ventas-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ventas-api:
    image: danibetancourt/back-ventas:latest
    container_name: ventas-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: db-ventas
      DB_PORT: 3306
      DB_NAME: ventas_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
    depends_on:
      db-ventas:
        condition: service_healthy

volumes:
  mysql-ventas-data:
